<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Visualizar Vídeo - {{ video.title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body, html { height: 100%; margin: 0; background: #000; display: flex; align-items: center; justify-content: center; }
        video { max-width: 100%; max-height: 100vh; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .back-btn { position: absolute; top: 20px; left: 20px; z-index: 10; opacity: 0.5; transition: 0.3s; }
        .back-btn:hover { opacity: 1; }
    </style>
</head>
<body>
    <a href="/" class="btn btn-sm btn-outline-light back-btn">← Ir ao Repositório</a>
    
    <video controls autoplay>
        <source src="{{ video.url }}" type="video/mp4">
        {% if video.vtt %}
            <track label="Português" kind="subtitles" srclang="pt" src="{{ video.vtt }}" default>
        {% endif %}
        Seu navegador não suporta o player.
    </video>
</body>
</html>
